<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Autoclicker Settings</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
    <link rel="stylesheet" type="text/css" href="./css/style.css">
</head>

<body>

    <div class="container-fluid">

        <h2 class="text-center mb-4">Autoclicker Settings</h2>

        <div class="row">

            <div class="col-md-6">
                <!-- Click Rate Inputs -->
                <div class="row mb-4">
                    <div class="col-md-4">
                        <label for="clickRateMinutes">Minutes:</label>
                        <input type="number" class="form-control" id="clickRateMinutes" placeholder="Clicks per minute">
                    </div>
                    <div class="col-md-4">
                        <label for="clickRateSeconds">Seconds:</label>
                        <input type="number" class="form-control" id="clickRateSeconds" placeholder="Clicks per second">
                    </div>
                    <div class="col-md-4">
                        <label for="clickRateMilliseconds">Milliseconds:</label>
                        <input type="number" class="form-control" id="clickRateMilliseconds"
                            placeholder="Clicks per millisecond">
                    </div>
                </div>

                <!-- Mouse Click and Click Type Options -->
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <!-- Mouse Click Button Options -->
                        <div class="form-group">
                            <div class="dropdown">
                                <button class="btn btn-secondary dropdown-toggle" type="button" id="mouseClickBTN"
                                    data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                                    Mouse Click Button
                                </button>
                                <div class="dropdown-menu" aria-labelledby="mouseClickBTN">
                                    <a class="dropdown-item" href="#">Left Click</a>
                                    <a class="dropdown-item" href="#">Right Click</a>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <!-- Click Type Options -->
                        <div class="form-group">
                            <div class="dropdown">
                                <button class="btn btn-secondary dropdown-toggle" type="button" id="clickTypeBTN"
                                    data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                                    Click Type Options
                                </button>
                                <div class="dropdown-menu" aria-labelledby="clickTypeBTN">
                                    <a class="dropdown-item" href="#">Single Click</a>
                                    <a class="dropdown-item" href="#">Double Click</a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <form class="form-inline">
                    <label>Click repetition</label>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="repeatTimes" id="repeatTimes"
                            value="repeatTimes">
                        <label class="form-check-label" for="repeatTimes">
                            Repeat <input type="number"> Times
                        </label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="repeatStop" id="repeatStop"
                            value="repeatStop" checked>
                        <label class="form-check-label" for="repeatStop">
                            Repeat until stop
                        </label>
                    </div>
                </form>
            </div>

        </div>

        <div class="row">
            <div class="col-md-6">
                <!-- Security Measures -->
                <div class="form-check">
                    <input type="checkbox" class="form-check-input" id="securityMeasures">
                    <label class="form-check-label" for="securityMeasures">Enable Security Measures</label>
                </div>
            </div>

            <div class="col-md-6">
                <!-- Dark Mode Toggle as Progress Bar -->
                <div class="form-check mt-4">
                    <label class="switch">
                        <span class="sun"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                <g fill="#ffd43b">
                                    <circle r="5" cy="12" cx="12"></circle>
                                    <path
                                        d="m21 13h-1a1 1 0 0 1 0-2h1a1 1 0 0 1 0 2zm-17 0h-1a1 1 0 0 1 0-2h1a1 1 0 0 1 0 2zm13.66-5.66a1 1 0 0 1 -.66-.29 1 1 0 0 1 0-1.41l.71-.71a1 1 0 1 1 1.41 1.41l-.71.71a1 1 0 0 1 -.75.29zm-12.02 12.02a1 1 0 0 1 -.71-.29 1 1 0 0 1 0-1.41l.71-.66a1 1 0 0 1 1.41 1.41l-.71.71a1 1 0 0 1 -.7.24zm6.36-14.36a1 1 0 0 1 -1-1v-1a1 1 0 0 1 2 0v1a1 1 0 0 1 -1 1zm0 17a1 1 0 0 1 -1-1v-1a1 1 0 0 1 2 0v1a1 1 0 0 1 -1 1zm-5.66-14.66a1 1 0 0 1 -.7-.29l-.71-.71a1 1 0 0 1 1.41-1.41l.71.71a1 1 0 0 1 0 1.41 1 1 0 0 1 -.71.29zm12.02 12.02a1 1 0 0 1 -.7-.29l-.66-.71a1 1 0 0 1 1.36-1.36l.71.71a1 1 0 0 1 0 1.41 1 1 0 0 1 -.71.24z">
                                    </path>
                                </g>
                            </svg></span>
                        <span class="moon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 384 512">
                                <path
                                    d="m223.5 32c-123.5 0-223.5 100.3-223.5 224s100 224 223.5 224c60.6 0 115.5-24.2 155.8-63.4 5-4.9 6.3-12.5 3.1-18.7s-10.1-9.7-17-8.5c-9.8 1.7-19.8 2.6-30.1 2.6-96.9 0-175.5-78.8-175.5-176 0-65.8 36-123.1 89.3-153.3 6.1-3.5 9.2-10.5 7.7-17.3s-7.3-11.9-14.3-12.5c-6.3-.5-12.6-.8-19-.8z">
                                </path>
                            </svg></span>
                        <input type="checkbox" class="input">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="btn btn-primary mt-3 rounded">Save Settings</button>

    </div>

    <!-- Bootstrap JS and Popper.js (required for Bootstrap components) -->
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>

    <!-- Electron Renderer -->
    <script src="./js/renderer.js"></script>

</body>

</html>
